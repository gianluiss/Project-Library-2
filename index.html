<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library</title>
    <link rel="stylesheet" href="styles.css">
    <script src="./script.js" defer></script>
</head>

<body>
    <header>
        <h1>Books</h1>
        <button class="new-book-btn">
            <img src="./plus-sign.svg" alt="Add book plus sign">
        </button>
    </header>

    <dialog id="add-book-dialog">
        <div class="dialog-wrapper">
            <h2>Add Book</h2>
            <form id="add-book-form">
                <div class="field">
                    <label for="title">Title:</label>
                    <input type="text" id="title" required>
                </div>
    
                <div class="field">
                    <label for="author">Author:</label>
                    <input type="text" id="author" required>
                </div>
    
                <div class="field">
                    <label for="genre">Genre:</label>
                    <select name="genre" id="genre" required>
                        <option value="" selected disabled></option>
                        <option value="Action">Action</option>
                        <option value="Fantasy">Fantasy</option>
                        <option value="Historical">Historical</option>
                        <option value="Horror">Horror</option>
                        <option value="Mystery">Mystery</option>
                        <option value="Romance">Romance</option>
                        <option value="Sci-Fi">Sci-Fi</option>
                    </select>
                </div>
    
                <div class="status-container">
                    <label>
                        <input type="radio" id="read" name="status" value="true" required>
                        Read
                    </label>
                    <label>
                        <input type="radio" id="unread" name="status" value="false">
                        Unread
                    </label>
                </div>
            </form>

            <div class="dialog-btn-container">
                <button class="dialog-close">Close</button>
                <button class="dialog-submit" form="add-book-form" type="submit">Submit</button>
            </div>
        </div>
    </dialog>

    <aside>
        <h2>Genre</h2>
        <form>

            <label>
                <input type="radio" name="genre" value="All" checked>
                All
            </label>

            <label>
                <input type="radio" name="genre" value="Action">
                Action
            </label>

            <label>
                <input type="radio" name="genre" value="Comedy">
                Comedy
            </label>

            <label>
                <input type="radio" name="genre" value="Fantasy">
                Fantasy
            </label>

            <label>
                <input type="radio" name="genre" value="Historical">
                Historical
            </label>

            <label>
                <input type="radio" name="genre" value="Horror">
                Horror
            </label>

            <label>
                <input type="radio" name="genre" value="Mystery">
                Mystery
            </label>

            <label>
                <input type="radio" name="genre" value="Romance">
                Romance
            </label>

            <label>
                <input type="radio" name="genre" value="Sci-Fi">
                Sci-Fi
            </label>
        </form>
    </aside>


    <main>

        <div class="card-grid-container">

            <!--
            <div class="card">
                <img class="card-img" src="./placeholder-pic.jpg" alt="placeholder image">
                <div class="card-info">
                    <h3>Dune</h3>
                    <p>by Frank Herbert</p>
                    <p>Sci-Fi</p>
                    <div class="card-footer">
                        <button class="delete-btn card-btn">Delete</button>
                        <button class="toggle-btn card-btn">Read</button>
                    </div>
                </div>
            </div>
            -->

        </div>


    </main>

</body>

</html>
